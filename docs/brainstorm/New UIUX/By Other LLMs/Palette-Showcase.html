  /* Direction cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1rem; }
  .card {
    background: #FFFCF7; border: 1px solid #E0D8C8; border-radius: 10px; padding: 1rem;

  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .card.dark { background: #1C1814; border-color: #3D3428; color: #E8D5C4; }
  .card.dark .hex { color: #B8A898; }

  .mood-line { font-size: 0.78rem; color: #8A7E6B; line-height: 1.4; font-style: italic; }
  .card.dark .mood-line { color: #A89880; }

  /* Swatches */
  .swatches { display: flex; gap: 6px; align-items: stretch; }
  .swatch {
    flex: 1; height: 48px; border-radius: 6px; position: relative; cursor: default;
    border: 1px solid rgba(0,0,0,0.08); min-width: 0; display: flex; align-items: flex-end;
    justify-content: center; padding-bottom: 4px;
  }
  .swatch .hex {
    font-family: 'IBM Plex Mono', 'JetBrains Mono', monospace;
    font-size: 0.6rem; font-weight: 600; letter-spacing: -0.01em;
    background: rgba(255,255,255,0.78); color: #1C1814; padding: 1px 5px; border-radius: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }
  .swatch.dark-hex .hex { background: rgba(0,0,0,0.55); color: #E8D5C4; }
  .swatch-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.03em; color: #8A7E6B; margin-top: 2px; text-align: center; }

  /* Mini card preview */
  .mini-preview {
    border-radius: 6px; padding: 10px 12px; font-size: 0.72rem; display: flex;
    flex-direction: column; gap: 4px; border: 1px solid rgba(0,0,0,0.06);
  }
  .mini-preview .preview-title { font-weight: 700; font-size: 0.82rem; }
  .mini-preview .preview-body { opacity: 0.85; line-height: 1.45; }
  .mini-preview .preview-accent { width: 32px; height: 3px; border-radius: 2px; margin-bottom: 2px; }

  /* Typography section */
  .typo-row { display: flex; gap: 0.5rem; flex-wrap: wrap; font-size: 0.68rem; }
  .typo-tag {
    padding: 2px 8px; border-radius: 4px; border: 1px solid #D4CFC5;
    background: #FAF7F2; white-space: nowrap;
  }
  .card.dark .typo-tag { background: #2A2520; border-color: #4A3D30; }

  /* Top pick indicator */
  .top-pick { border-left: 3px solid #B85C3A; padding-left: 0.6rem; }
  .top-badge {
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    color: #B85C3A; margin-bottom: 0.15rem;
  }
  .card.dark .top-badge { color: #E8A84C; }

  /* Responsive */

    body { padding: 0.75rem; }

    .card { padding: 0.75rem; }

function isDark(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) < 86;
}

function renderSwatch(hex, label) {
  const dark = isDark(hex);
  return '<div class="swatch'+(dark?' dark-hex':'')+'" style="background:'+hex+'" title="'+label+': '+hex+'"><span class="hex">'+hex+'</span></div>';
}

function renderCard(d) {
  const isDk = isDark(d.palette[0]);
  const swatchesHTML = d.palette.map((h,i) => {
    const labels = ['BG','Card','Text','Accent','Alert'];
    return renderSwatch(h, labels[i]);
  }).join('');
  const previewHTML = '<div class="mini-preview" style="background:'+d.palette[0]+';color:'+d.palette[2]+'"><div class="preview-accent" style="background:'+d.palette[3]+'"></div><div class="preview-title" style="color:'+d.palette[2]+'">บทความตัวอย่าง</div><div class="preview-body">เน้นเนื้อๆ ไม่เอาน้ำ — ดูเนื้อ ไม่ดูหน้า</div></div>';
  return '<div class="card'+(isDk?' dark':'')+(d.pick?' top-pick':'')+'">'
    + '<div class="card-head">'
    + '<div><h3>'+(d.pick?'<span class="top-badge">★ Top Pick</span> ':'')+d.name+'</h3>'
    + '<div class="mood-line">'+d.mood+'</div></div></div>'
    + '<div class="swatches">'+swatchesHTML+'</div>'
    + '<div style="display:flex;align-items:center;gap:4px;font-size:0.55rem;text-transform:uppercase;color:#8A7E6B"><span>BG</span><span>Card</span><span>Text</span><span>Accent</span><span>Alert</span></div>'
    + previewHTML
    + '<div class="typo-row"><span class="typo-tag">'+d.typo+'</span></div>'
    + '</div>';
}

function renderModel(m) {
  const scoreClass = m.gold ? 'gold' : (m.score >= 22 ? 'silver' : '');
  return '<div class="model"><div class="model-header">'
    + '<h2>'+m.model+'</h2>'
    + '<span class="score '+scoreClass+'">'+m.score+'/25</span>'
    + '<span class="model-sub">'+m.harness+'</span>'
    + '</div><div class="cards">'
    + m.dirs.map(d => renderCard(d)).join('')
    + '</div></div>';
}

function filterAll() { setFilter('all'); }
function filterLight() { setFilter('light'); }
function filterDark() { setFilter('dark'); }
function filterTopPicks() { setFilter('top'); }

function setFilter(mode) {
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.filters button').forEach(b => {
    if ((mode==='all' && b.textContent==='All')
     || (mode==='light' && b.textContent.includes('Light'))
     || (mode==='dark' && b.textContent.includes('Dark'))
     || (mode==='top' && b.textContent.includes('Top'))) b.classList.add('active');
  });
  document.querySelectorAll('.card').forEach(c => {
    const isDark = c.classList.contains('dark');
    const isTop = c.querySelector('.top-badge') !== null;
    if (mode === 'all') c.style.display = '';
    else if (mode === 'light') c.style.display = !isDark ? '' : 'none';
    else if (mode === 'dark') c.style.display = isDark ? '' : 'none';
    else if (mode === 'top') c.style.display = isTop ? '' : 'none';
  });
  // Hide empty model sections
  document.querySelectorAll('.model').forEach(m => {
    const visibleCards = m.querySelectorAll('.card[style*="display: none"], .card:not([style])').length;
    // check which are visible
    const allCards = m.querySelectorAll('.card');
    let anyVisible = false;
    allCards.forEach(c => { if (c.style.display !== 'none') anyVisible = true; });
    m.style.display = anyVisible ? '' : 'none';
  });
}

// Copy hex on swatch click
document.addEventListener('click', function(e) {
  const hex = e.target.closest('.swatch')?.querySelector('.hex')?.textContent;
  if (hex) {
    navigator.clipboard.writeText(hex).then(() => {
      const el = e.target.closest('.swatch').querySelector('.hex');
      const orig = el.textContent;
      el.textContent = 'Copied!';
      setTimeout(() => el.textContent = orig, 800);
    });
  }
});

// Render all
document.write(DATA.map(m => renderModel(m)).join(''));
